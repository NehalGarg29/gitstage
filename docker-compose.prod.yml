version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: gitstage-db-prod
    environment:
      POSTGRES_USER: gitstage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitstage_secure_prod_pass_987}
      POSTGRES_DB: gitstage_db
    # Bind database port to localhost only for secure host admin access (if needed)
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitstage -d gitstage_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitstage-backend-prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://gitstage:${POSTGRES_PASSWORD:-gitstage_secure_prod_pass_987}@db:5432/gitstage_db
      - REDIS_URL=${REDIS_URL:-}  # Optional in production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET:-gitstage_super_secret_jwt_key_987654321}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost/api}
    container_name: gitstage-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
